<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70B879;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9a67;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="90" cy="90" r="90" fill="url(#grad)"/>
  
  <!-- Code brackets: </Today> -->
  <text x="90" y="110" font-family="Monaco, 'Courier New', monospace" font-size="56" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-2">
    &lt;/&gt;
  </text>
  
  <!-- Small accent line -->
  <line x1="45" y1="140" x2="135" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
</svg>
